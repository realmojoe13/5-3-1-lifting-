const TRAINING_MAXES = {

// Helper to build a standard 5/3/1 day's working sets for each week
function buildLift(name, tm, warmups) {
  const r = (pct) => Math.round((tm * pct) / 5) * 5;
  return {
    name,
    tm,
    weeks: {
      1: [
        ...warmups,
        { label: "Set 1", weight: r(0.65), reps: "5", rest: 180, pct: "65%" },
        { label: "Set 2", weight: r(0.75), reps: "5", rest: 180, pct: "75%" },
        { label: "Set 3", weight: r(0.85), reps: "5+", rest: 300, pct: "85%", amrap: true },
      ],
      2: [
        ...warmups,
        { label: "Set 1", weight: r(0.70), reps: "3", rest: 180, pct: "70%" },
        { label: "Set 2", weight: r(0.80), reps: "3", rest: 180, pct: "80%" },
        { label: "Set 3", weight: r(0.90), reps: "3+", rest: 300, pct: "90%", amrap: true },
      ],
      3: [
        ...warmups,
        { label: "Set 1", weight: r(0.75), reps: "5", rest: 180, pct: "75%" },
        { label: "Set 2", weight: r(0.85), reps: "3", rest: 180, pct: "85%" },
        { label: "Set 3", weight: r(0.95), reps: "1+", rest: 300, pct: "95%", amrap: true },
      ],
      4: [
        { label: "Set 1", weight: r(0.40), reps: "5", rest: 120, pct: "40%" },
        { label: "Set 2", weight: r(0.50), reps: "5", rest: 120, pct: "50%" },
        { label: "Set 3", weight: r(0.60), reps: "5", rest: 120, pct: "60%" },
      ],
    },
  };
}

const MCGILL = [
  { name: "Curl-Up", scheme: "3 × 8 / 8s hold", cue: "Hands under low back. No spinal flexion.", rest: 30 },
  { name: "Side Plank", scheme: "3 × 20s each side", cue: "On knees until strong enough for feet.", rest: 30 },
  { name: "Bird Dog", scheme: "3 × 8 each side / 8s hold", cue: "Spine neutral. Move slow.", rest: 30 },
];

const MCGILL_ACCENT = "#C2410C";

const DAY_ORDER = ["daily", "monday", "tuesday", "thursday", "friday"];
const DAY_LABELS = { daily: "DAILY", monday: "MON", tuesday: "TUE", thursday: "THU", friday: "FRI" };

// ─────────────────────────────────────────────────────────────────────────
// STORAGE (in-memory only — resets each session per artifact constraints)
// ─────────────────────────────────────────────────────────────────────────

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v === null ? fallback : JSON.parse(v);
  } catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function useProgress() {
  const [done, setDone] = useState(() => load("w531_done", {}));
  const [amrap, setAmrap] = useState(() => load("w531_amrap", {}));
  const [streak, setStreak] = useState(() => load("w531_streak", 0));
  const [lastDailyDate, setLastDailyDate] = useState(() => load("w531_lastDaily", null));

  useEffect(() => save("w531_done", done), [done]);
  useEffect(() => save("w531_amrap", amrap), [amrap]);
  useEffect(() => save("w531_streak", streak), [streak]);
  useEffect(() => save("w531_lastDaily", lastDailyDate), [lastDailyDate]);

  const toggle = (key) => setDone((d) => ({ ...d, [key]: !d[key] }));
  const setAmrapReps = (key, val) => setAmrap((a) => ({ ...a, [key]: val }));
  const reset = () => { setDone({}); setAmrap({}); };
  const completeDaily = () => {
    const today = new Date().toDateString();
    if (lastDailyDate === today) return;
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    setStreak((s) => (lastDailyDate === yesterday ? s + 1 : 1));
    setLastDailyDate(today);
  };
  return { done, amrap, toggle, setAmrapReps, reset, streak, lastDailyDate, completeDaily };
}

// ─────────────────────────────────────────────────────────────────────────
// REST TIMER
// ─────────────────────────────────────────────────────────────────────────

function RestTimer({ seconds, accent, onClose }) {
  const [remaining, setRemaining] = useState(seconds);
  const intervalRef = useRef(null);

  useEffect(() => {
    intervalRef.current = setInterval(() => {
      setRemaining((r) => {
        if (r <= 1) {
          clearInterval(intervalRef.current);
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          return 0;
        }
        return r - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, []);

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const pct = (remaining / seconds) * 100;
  const isDone = remaining === 0;

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 100,
      background: "rgba(10,10,12,0.92)", backdropFilter: "blur(8px)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: 24,
    }}>
      <div style={{
        fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase",
        letterSpacing: 4, fontSize: 14, color: "#888", marginBottom: 8,
      }}>
        {isDone ? "Rest Complete" : "Rest"}
      </div>
      <div style={{ position: "relative", width: 260, height: 260, marginBottom: 32 }}>
        <svg width="260" height="260" style={{ transform: "rotate(-90deg)" }}>
          <circle cx="130" cy="130" r="118" fill="none" stroke="#222" strokeWidth="10" />
          <circle
            cx="130" cy="130" r="118" fill="none"
            stroke={isDone ? "#2B8A3E" : accent} strokeWidth="10" strokeLinecap="round"
            strokeDasharray={2 * Math.PI * 118}
            strokeDashoffset={2 * Math.PI * 118 * (1 - pct / 100)}
            style={{ transition: "stroke-dashoffset 1s linear" }}
          />
        </svg>
        <div style={{
          position: "absolute", inset: 0, display: "flex",
          alignItems: "center", justifyContent: "center", flexDirection: "column",
        }}>
          <div style={{
            fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
            fontSize: 72, color: "#fff", lineHeight: 1,
            fontVariantNumeric: "tabular-nums",
          }}>
            {mins}:{secs.toString().padStart(2, "0")}
          </div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <button onClick={() => setRemaining((r) => r + 30)} style={timerBtnStyle("#333")}>+30s</button>
        <button onClick={onClose} style={timerBtnStyle(accent)}>
          {isDone ? "Done" : "Skip"}
        </button>
      </div>
    </div>
  );
}

function timerBtnStyle(bg) {
  return {
    background: bg, color: "#fff", border: "none",
    fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase",
    letterSpacing: 2, fontSize: 18, fontWeight: 600,
    padding: "14px 32px", borderRadius: 4, cursor: "pointer",
  };
}

// ─────────────────────────────────────────────────────────────────────────
// SET ROW
// ─────────────────────────────────────────────────────────────────────────

function SetRow({ set, dayKey, week, idx, accent, progress, onStartTimer }) {
  const key = `${dayKey}-w${week}-set${idx}`;
  const isDone = progress.done[key];
  const isWarmup = set.pct === "warmup";

  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10,
      padding: "12px 14px", borderRadius: 6,
      background: isDone ? "rgba(43,138,62,0.10)" : isWarmup ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.04)",
      border: `1px solid ${isDone ? "rgba(43,138,62,0.4)" : "rgba(255,255,255,0.07)"}`,
      marginBottom: 6, transition: "all 0.2s",
    }}>
      <button
        onClick={() => progress.toggle(key)}
        style={{
          width: 26, height: 26, borderRadius: 5, flexShrink: 0,
          border: `2px solid ${isDone ? "#2B8A3E" : "#555"}`,
          background: isDone ? "#2B8A3E" : "transparent",
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          color: "#fff", fontSize: 15, padding: 0,
        }}
      >
        {isDone ? "✓" : ""}
      </button>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          display: "flex", alignItems: "baseline", gap: 8,
        }}>
          <span style={{
            fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase",
            letterSpacing: 1, fontSize: 13, color: isWarmup ? "#777" : "#aaa", fontWeight: 600,
          }}>
            {set.label}
          </span>
          {!isWarmup && (
            <span style={{
              fontSize: 10, color: accent, fontWeight: 700,
              fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1,
            }}>
              {set.pct}
            </span>
          )}
          {set.amrap && (
            <span style={{
              fontSize: 9, background: "#C0392B", color: "#fff",
              padding: "2px 6px", borderRadius: 3, letterSpacing: 1, fontWeight: 700,
              fontFamily: "'Barlow Condensed', sans-serif",
            }}>
              AMRAP
            </span>
          )}
        </div>
      </div>

      <div style={{ textAlign: "right", flexShrink: 0 }}>
        <div style={{
          fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
          fontSize: 22, color: "#fff", lineHeight: 1, fontVariantNumeric: "tabular-nums",
        }}>
          {set.weight}
          <span style={{ fontSize: 12, color: "#666", marginLeft: 3 }}>lb</span>
        </div>
        <div style={{
          fontSize: 13, color: accent, fontWeight: 600,
          fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 0.5,
        }}>
          × {set.reps}
        </div>
      </div>

      {set.amrap && isDone ? (
        <input
          type="number"
          placeholder="reps"
          value={progress.amrap[key] || ""}
          onChange={(e) => progress.setAmrapReps(key, e.target.value)}
          style={{
            width: 52, background: "rgba(192,57,43,0.15)", border: "1px solid #C0392B",
            borderRadius: 4, color: "#fff", fontSize: 16, textAlign: "center",
            padding: "8px 4px", fontFamily: "'Barlow Condensed', sans-serif", flexShrink: 0,
          }}
        />
      ) : (
        <button
          onClick={() => onStartTimer(set.rest)}
          style={{
            flexShrink: 0, background: "transparent", border: `1px solid ${accent}55`,
            borderRadius: 5, color: accent, cursor: "pointer", padding: "8px 10px",
            fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, fontWeight: 600,
            letterSpacing: 0.5, lineHeight: 1,
          }}
        >
          {Math.floor(set.rest / 60)}:{(set.rest % 60).toString().padStart(2, "0")}
        </button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// ASSISTANCE / EXERCISE BLOCK
// ─────────────────────────────────────────────────────────────────────────

function ExerciseBlock({ ex, dayKey, idx, accent, progress, onStartTimer, prefix = "assist" }) {
  const key = `${dayKey}-${prefix}-${idx}`;
  const isDone = progress.done[key];
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10,
      padding: "11px 14px", borderRadius: 6,
      background: isDone ? "rgba(43,138,62,0.10)" : "rgba(255,255,255,0.03)",
      border: `1px solid ${isDone ? "rgba(43,138,62,0.4)" : "rgba(255,255,255,0.07)"}`,
      marginBottom: 6,
    }}>
      <button
        onClick={() => progress.toggle(key)}
        style={{
          width: 24, height: 24, borderRadius: 5, flexShrink: 0,
          border: `2px solid ${isDone ? "#2B8A3E" : "#555"}`,
          background: isDone ? "#2B8A3E" : "transparent",
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          color: "#fff", fontSize: 14, padding: 0,
        }}
      >
        {isDone ? "✓" : ""}
      </button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ color: "#eee", fontSize: 15, fontWeight: 600, marginBottom: 2 }}>
          {ex.name}
        </div>
        {ex.cue && (
          <div style={{ color: "#777", fontSize: 12, lineHeight: 1.3 }}>{ex.cue}</div>
        )}
        {ex.weight && (
          <div style={{
            color: "#999", fontSize: 12,
            fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 0.5,
          }}>
            {ex.weight}
          </div>
        )}
      </div>
      <div style={{
        fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
        fontSize: 18, color: accent, flexShrink: 0,
      }}>
        {ex.scheme}
      </div>
      {ex.rest && (
        <button
          onClick={() => onStartTimer(ex.rest)}
          style={{
            flexShrink: 0, background: "transparent", border: `1px solid ${accent}55`,
            borderRadius: 5, color: accent, cursor: "pointer", padding: "7px 9px",
            fontFamily: "'Barlow Condensed', sans-serif", fontSize: 11, fontWeight: 600,
          }}
        >
          {Math.floor(ex.rest / 60)}:{(ex.rest % 60).toString().padStart(2, "0")}
        </button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// SECTION HEADER
// ─────────────────────────────────────────────────────────────────────────

function SectionLabel({ children, accent }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10, margin: "22px 0 12px",
    }}>
      <div style={{ width: 4, height: 18, background: accent, borderRadius: 2 }} />
      <span style={{
        fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase",
        letterSpacing: 2, fontSize: 15, color: "#ccc", fontWeight: 600,
      }}>
        {children}
      </span>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────

function App() {
  const [day, setDay] = useState("monday");
  const [week, setWeek] = useState(1);
  const [hingePhase, setHingePhase] = useState(1);
  const [timer, setTimer] = useState(null);
  const progress = useProgress();

  const data = PROGRAM[day];
  const accent = data.accent;

  // Count completion for current day
  const dayKeys = Object.keys(progress.done).filter(
    (k) => k.startsWith(day) && progress.done[k]
  );

  let totalSets = 0;
  if (data.isDaily) {
    totalSets = MCGILL.length;
  } else if (!data.isHinge) {
    totalSets = data.lift.weeks[week].length + data.assistance.length + (data.mcgill ? MCGILL.length : 0);
  } else {
    totalSets = data.phases[hingePhase].exercises.length + (data.mcgill ? MCGILL.length : 0);
  }
  const completedCount = dayKeys.length;
  const completionPct = totalSets > 0 ? Math.round((completedCount / totalSets) * 100) : 0;

  return (
    <div style={{
      minHeight: "100vh", background: "#0D0D0F", color: "#fff",
      fontFamily: "'Inter', -apple-system, sans-serif",
      maxWidth: 520, margin: "0 auto", paddingBottom: 80,
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0D0D0F; }
        input:focus { outline: none; }
        @media (prefers-reduced-motion: reduce) {
          * { transition: none !important; }

      `}</style>

      {timer !== null && (
        <RestTimer seconds={timer} accent={accent} onClose={() => setTimer(null)} />

        padding: "20px 18px 0", position: "sticky", top: 0, zIndex: 20,

            fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
            fontSize: 30, margin: 0, letterSpacing: 1, textTransform: "uppercase",
          }}>

          </h1>

            style={{
              background: "transparent", border: "1px solid #333", color: "#777",
              fontSize: 11, padding: "5px 10px", borderRadius: 4, cursor: "pointer",

            }}

          {DAY_ORDER.map((d) => (
            <button
              key={d}

                flex: 1, padding: "10px 0", borderRadius: 6, cursor: "pointer",
                border: `1px solid ${day === d ? PROGRAM[d].accent : "#222"}`,
                background: day === d ? PROGRAM[d].accent : "transparent",
                color: day === d ? "#fff" : "#888",
                fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600,
                fontSize: 15, letterSpacing: 1,
              }}
            >
              {DAY_LABELS[d]}
            </button>
          ))}
        </div>
      </div>

      {/* BODY */}
      <div style={{ padding: "0 18px" }}>
        {/* DAY TITLE + PROGRESS */}
        <div style={{ marginBottom: 4 }}>
          <div style={{
            fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
            fontSize: 26, textTransform: "uppercase", letterSpacing: 0.5, lineHeight: 1.1,
          }}>
            {data.title}
          </div>
          {!data.isHinge && !data.isDaily && (
            <div style={{ color: "#666", fontSize: 13, marginTop: 2 }}>
              Training Max: <span style={{ color: "#aaa", fontWeight: 600 }}>{data.lift.tm} lbs</span>
            </div>
          )}
          {data.isDaily && (
            <div style={{ color: "#666", fontSize: 13, marginTop: 2 }}>
              Do once daily — not first thing on waking. ~5-7 min.
            </div>
          )}
        </div>

        {/* PROGRESS BAR */}
        <div style={{
          height: 6, background: "#1a1a1d", borderRadius: 3, overflow: "hidden",
          margin: "12px 0 6px",
        }}>
          <div style={{
            height: "100%", width: `${completionPct}%`, background: accent,
            borderRadius: 3, transition: "width 0.3s",
          }} />
        </div>
        <div style={{
          fontSize: 12, color: "#666", textAlign: "right", marginBottom: 6,
          fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 1,
        }}>
          {completedCount} / {totalSets} complete
        </div>

        {/* WEEK SELECTOR (non-hinge, non-daily) */}
        {!data.isHinge && !data.isDaily && (
          <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
            {[1, 2, 3, 4].map((w) => (
              <button
                key={w}
                onClick={() => setWeek(w)}
                style={{
                  flex: 1, padding: "8px 0", borderRadius: 5, cursor: "pointer",
                  border: `1px solid ${week === w ? accent : "#222"}`,
                  background: week === w ? `${accent}22` : "transparent",
                  color: week === w ? accent : "#777",
                  fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600,
                  fontSize: 13, letterSpacing: 0.5,
                }}
              >
                {w === 4 ? "DELOAD" : `WK ${w}`}
              </button>
            ))}
          </div>
        )}

        {/* HINGE PHASE SELECTOR */}
        {data.isHinge && (
          <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
            {[1, 2, 3].map((p) => (
              <button
                key={p}
                onClick={() => setHingePhase(p)}
                style={{
                  flex: 1, padding: "8px 0", borderRadius: 5, cursor: "pointer",
                  border: `1px solid ${hingePhase === p ? accent : "#222"}`,
                  background: hingePhase === p ? `${accent}22` : "transparent",
                  color: hingePhase === p ? accent : "#777",
                  fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600,
                  fontSize: 13, letterSpacing: 0.5,
                }}
              >
                PHASE {p}
              </button>
            ))}
          </div>
        )}

        {/* ── DAILY BACK ROUTINE ── */}
        {data.isDaily && (
          <>
            {/* STREAK CARD */}
            <div style={{
              display: "flex", alignItems: "center", gap: 14,
              background: `${accent}12`, border: `1px solid ${accent}40`,
              borderRadius: 10, padding: "16px 18px", margin: "16px 0 4px",
            }}>
              <div style={{
                fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
                fontSize: 52, color: accent, lineHeight: 1, fontVariantNumeric: "tabular-nums",
              }}>
                {progress.streak}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{
                  fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase",
                  letterSpacing: 1.5, fontSize: 14, color: "#ddd", fontWeight: 600,
                }}>
                  Day Streak
                </div>
                <div style={{ color: "#999", fontSize: 12, marginTop: 2 }}>
                  {progress.lastDailyDate === new Date().toDateString()
                    ? "Done today — see you tomorrow."
                    : "Finish the routine, then mark today complete."}
                </div>
              </div>
            </div>

            <SectionLabel accent={accent}>The Routine</SectionLabel>
            {MCGILL.map((ex, idx) => (
              <ExerciseBlock
                key={idx} ex={ex} dayKey={day} idx={idx}
                accent={accent} progress={progress} onStartTimer={setTimer}
                prefix="daily-mcgill"
              />
            ))}

            <button
              onClick={progress.completeDaily}
              disabled={progress.lastDailyDate === new Date().toDateString()}
              style={{
                width: "100%", marginTop: 14, padding: "16px 0", borderRadius: 8,
                border: "none", cursor: progress.lastDailyDate === new Date().toDateString() ? "default" : "pointer",
                background: progress.lastDailyDate === new Date().toDateString() ? "#1a3d1f" : accent,
                color: "#fff", fontFamily: "'Barlow Condensed', sans-serif",
                textTransform: "uppercase", letterSpacing: 2, fontSize: 18, fontWeight: 700,
              }}
            >
              {progress.lastDailyDate === new Date().toDateString() ? "✓ Completed Today" : "Mark Today Complete"}
            </button>
          </>
        )}

        {/* ── NON-HINGE: MAIN LIFT ── */}
        {!data.isHinge && !data.isDaily && (
          <>
            <SectionLabel accent={accent}>
              {week === 4 ? "Deload Sets" : "Main Work"}
            </SectionLabel>
            {data.lift.weeks[week].map((set, idx) => (
              <SetRow
                key={idx} set={set} dayKey={day} week={week} idx={idx}
                accent={accent} progress={progress} onStartTimer={setTimer}
              />
            ))}

            {week !== 4 && (
              <>
                <SectionLabel accent={accent}>Assistance</SectionLabel>
                {data.assistance.map((ex, idx) => (
                  <ExerciseBlock
                    key={idx} ex={ex} dayKey={day} idx={idx}
                    accent={accent} progress={progress} onStartTimer={setTimer}
                  />
                ))}
              </>
            )}
          </>
        )}

        {/* ── HINGE: PHASE EXERCISES ── */}
        {data.isHinge && (
          <>
            <div style={{
              background: `${accent}15`, border: `1px solid ${accent}40`,
              borderRadius: 6, padding: "10px 12px", margin: "14px 0 6px",
            }}>
              <div style={{
                fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 600,
                fontSize: 15, color: accent, letterSpacing: 0.5, marginBottom: 3,
              }}>
                {data.phases[hingePhase].name}
              </div>
              <div style={{ color: "#aaa", fontSize: 12, lineHeight: 1.4 }}>
                {data.phases[hingePhase].note}
              </div>
            </div>
            <SectionLabel accent={accent}>Hinge Work</SectionLabel>
            {data.phases[hingePhase].exercises.map((ex, idx) => (
              <ExerciseBlock
                key={idx} ex={ex} dayKey={day} idx={idx}
                accent={accent} progress={progress} onStartTimer={setTimer}
                prefix={`hinge-p${hingePhase}`}
              />
            ))}
          </>
        )}

        {/* ── McGILL BIG 3 ── */}
        {data.mcgill && (
          <>
            <SectionLabel accent={accent}>McGill Big 3 — Back Insurance</SectionLabel>
            {MCGILL.map((ex, idx) => (
              <ExerciseBlock
                key={idx} ex={ex} dayKey={day} idx={idx}
                accent={accent} progress={progress} onStartTimer={setTimer}
                prefix="mcgill"
              />
            ))}
          </>
        )}

        {/* FOOTER NOTE */}
        <div style={{
          marginTop: 28, padding: "14px 16px", borderRadius: 8,
          background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)",
        }}>
          <div style={{
            fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase",
            letterSpacing: 1.5, fontSize: 12, color: accent, fontWeight: 600, marginBottom: 6,
          }}>
            Remember
          </div>
          <div style={{ color: "#999", fontSize: 13, lineHeight: 1.5 }}>
            {data.isDaily
              ? "McGill recommends these daily — ideally in the morning, but not in the first hour after waking when discs are most vulnerable. Build endurance through frequency, like brushing your teeth. Keep your spine neutral throughout."
              : "Tap the timer on any set to start your rest countdown. Log AMRAP reps after checking off the top set. After a full 4-week cycle: bench +5, press +5, leg press +10. Any back twinge on Friday — drop back a phase."}
          </div>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
